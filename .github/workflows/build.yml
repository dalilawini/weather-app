name: Build ESP8266 Arduino Project

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index

      - name: Install ESP8266 core
        run: |
          arduino-cli core update-index --additional-urls \
          http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls \
          http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install libraries
        run: |
          arduino-cli lib update-index

      - name: Compile project
        run: |
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 --build-property compiler.cpp.extra_flags="-Iapp -Idisplay -Iio -Isensors -Iwireless -Istorage" -v
